app = "go-game-review-analyser"
primary_region = "lhr"

[build]

[env]
  DB_PATH = "/data/game_reviews.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "game_reviews_data"
  destination = "/data"
